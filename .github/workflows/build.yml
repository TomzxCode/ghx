name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            artifact: ghx-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: ghx-darwin-arm64
          - goos: linux
            goarch: amd64
            artifact: ghx-linux-amd64
          - goos: windows
            goarch: amd64
            artifact: ghx-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          OUTPUT="${{ matrix.artifact }}" make build

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release-latest:
    name: Update latest release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Recreate latest tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --target ${{ github.sha }} \
            --title "Latest" \
            --notes "Latest build from \`main\` — commit ${{ github.sha }}" \
            --prerelease \
            ghx-darwin-amd64 \
            ghx-darwin-arm64 \
            ghx-linux-amd64 \
            ghx-windows-amd64.exe
